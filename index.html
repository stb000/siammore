<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM MORE 饗泰多線上點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        siamPurple: '#4A2A74',
                        siamGold: '#C9A054',
                        siamBg: '#F9F8F6'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-siamBg text-gray-800 min-h-screen flex flex-col">

    <!-- 頂部導覽列 Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-2xl font-bold tracking-wider text-siamPurple flex items-center">
                <i class="fa-solid fa-utensils mr-2 text-siamGold"></i>SIAM MORE
            </span>
            <span id="header-status" class="text-sm font-medium text-gray-500 hidden">
                <span id="selected-store-tag" class="bg-gray-100 text-gray-700 px-2 py-1 rounded mr-2">未選分店</span>
                <span id="selected-time-tag" class="text-gray-400">請先完成資料輸入</span>
            </span>
        </div>
    </header>

    <!-- 主區塊 -->

        <!-- STEPPER / 進度指示條 -->

            <div class="flex items-center justify-between relative">
                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-0.5 bg-gray-200 -z-10"></div>
                <div id="step-progress-line" class="absolute left-0 top-1/2 -translate-y-1/2 w-0 h-0.5 bg-siamPurple -z-10 transition-all duration-300"></div>
                <div class="flex flex-col items-center bg-siamBg px-2">
                    <div id="circle-1" class="w-8 h-8 rounded-full bg-siamPurple text-white flex items-center justify-center font-bold text-sm shadow-sm">1</div>
                    <span id="text-1" class="text-xs font-bold text-siamPurple mt-2">選擇分店</span>
                </div>
                <div class="flex flex-col items-center bg-siamBg px-2">
                    <div id="circle-2" class="w-8 h-8 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center font-bold text-sm">2</div>
                    <span id="text-2" class="text-xs font-medium text-gray-400 mt-2">日期餐期</span>
                </div>
                <div class="flex flex-col items-center bg-siamBg px-2">
                    <div id="circle-3" class="w-8 h-8 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center font-bold text-sm">3</div>
                    <span id="text-3" class="text-xs font-medium text-gray-400 mt-2">顧客資料</span>
                </div>
            </div>
        </div>

        <!-- 前置設定面板 (Wizard Card) -->
        <div id="wizard-container" class="max-w-md mx-auto bg-white rounded-2xl border border-gray-200 p-6 shadow-sm mb-8">
            <!-- 第一層：選擇分店 -->
            <div id="panel-1" class="space-y-4">
                <h2 class="text-lg font-bold text-gray-900 mb-2"><i class="fa-solid fa-shop text-siamGold mr-2"></i>第一步：請選擇用餐分店</h2>
                <div class="space-y-2">
                    <button onclick="selectStore('台北信義店')" class="w-full p-4 text-left border border-gray-200 rounded-xl hover:border-siamPurple hover:bg-purple-50/20 transition flex justify-between items-center group">
                        <span class="font-medium text-gray-800">台北信義店</span>
                        <i class="fa-solid fa-chevron-right text-gray-300 group-hover:text-siamPurple transition"></i>
                    </button>
                    <button onclick="selectStore('桃園中正店')" class="w-full p-4 text-left border border-gray-200 rounded-xl hover:border-siamPurple hover:bg-purple-50/20 transition flex justify-between items-center group">
                        <span class="font-medium text-gray-800">桃園中正店</span>
                        <i class="fa-solid fa-chevron-right text-gray-300 group-hover:text-siamPurple transition"></i>
                    </button>
                </div>
            </div>

            <!-- 第二層：選擇用餐日期與餐期 -->
            <div id="panel-2" class="space-y-4 hidden">
                <h2 class="text-lg font-bold text-gray-900 mb-2"><i class="fa-solid fa-calendar-days text-siamGold mr-2"></i>第二步：選擇日期與餐期</h2>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">用餐日期</label>
                    <input type="date" id="input-date" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-siamPurple text-gray-700 bg-gray-50/50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">用餐餐期</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectPeriod('午餐')" id="btn-period-lunch" class="p-3 border border-gray-200 rounded-xl text-sm font-medium hover:bg-gray-50">午餐</button>
                        <button onclick="selectPeriod('下午茶')" id="btn-period-tea" class="p-3 border border-gray-200 rounded-xl text-sm font-medium hover:bg-gray-50">下午茶</button>
                        <button onclick="selectPeriod('晚餐')" id="btn-period-dinner" class="p-3 border border-gray-200 rounded-xl text-sm font-medium hover:bg-gray-50">晚餐</button>
                    </div>
                </div>
                <div class="pt-4 flex space-x-3">
                    <button onclick="goBack(1)" class="flex-1 py-3 bg-gray-100 text-gray-600 font-medium rounded-xl text-sm">上一步</button>
                    <button onclick="submitStep2()" class="flex-1 py-3 bg-siamPurple text-white font-medium rounded-xl text-sm">下一步</button>
                </div>
            </div>

            <!-- 第三層：輸入顧客電話與姓名 -->
            <div id="panel-3" class="space-y-4 hidden">
                <h2 class="text-lg font-bold text-gray-900 mb-2"><i class="fa-solid fa-user-check text-siamGold mr-2"></i>第三步：填寫聯繫資料</h2>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">顧客姓名</label>
                    <input type="text" id="cust-name" placeholder="請輸入姓名" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-siamPurple text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">行動電話</label>
                    <input type="tel" id="cust-phone" placeholder="例：0912345678" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-siamPurple text-sm">
                </div>
                <div class="pt-4 flex space-x-3">
                    <button onclick="goBack(2)" class="flex-1 py-3 bg-gray-100 text-gray-600 font-medium rounded-xl text-sm">上一步</button>
                    <button onclick="submitStep3()" class="flex-1 py-3 bg-siamPurple text-white font-medium rounded-xl text-sm">開始點餐</button>
                </div>
            </div>
        </div>

        <!-- ==================== 核心點餐區塊 ==================== -->
        <div id="menu-container" class="hidden flex flex-col lg:flex-row gap-6 opacity-0 transition-opacity duration-500">
            
            <!-- 左側：菜單分類與商品列表 -->
            <div class="flex-1 flex flex-col">
                <!-- 分類動態生成區 -->
                <div id="category-bar" class="sticky top-16 bg-siamBg py-2 z-30 overflow-x-auto no-scrollbar flex space-x-2 border-b border-gray-200/60 mb-6">
                    <!-- 由 JS 動態注入 -->
                </div>

                <!-- 商品卡片網格 -->
                <div id="dishes-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- 由 JS 動態注入 -->
                </div>
            </div>

            <!-- 右側：固定式購物車明細 -->
            <div class="w-full lg:w-96 bg-white rounded-2xl border border-gray-200 p-5 shadow-sm sticky top-24 self-start flex flex-col max-h-[calc(100vh-8rem)]">
                <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
                    <h2 class="text-base font-bold text-gray-900 flex items-center">
                        <i class="fa-solid fa-shopping-bag mr-2 text-siamGold"></i>明細隨時看
                    </h2>
                    <span id="cart-count" class="bg-siamBg text-siamPurple text-xs px-2 py-1 rounded-full font-bold">0 項商品</span>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 no-scrollbar min-h-[120px] max-h-[250px] pr-1">
                    <div id="empty-state" class="text-center py-8 text-gray-400 flex flex-col items-center justify-center space-y-2">
                        <i class="fa-solid fa-receipt text-2xl text-gray-200"></i>
                        <p class="text-xs font-light">尚未選擇任何美味菜色</p>
                    </div>
                </div>
                <div class="border-t border-gray-100 pt-4 mt-4 space-y-2.5">
                    <div class="flex justify-between text-xs text-gray-500"><span>小計</span><span id="subtotal">NT$ 0</span></div>
                    <div class="flex justify-between text-xs text-gray-500"><span>服務費 (10%)</span><span id="service-charge">NT$ 0</span></div>
                    <div class="flex justify-between items-center pt-2 border-t border-dashed border-gray-200">
                        <span class="font-bold text-sm text-gray-900">總計</span>
                        <span id="total-amount" class="text-xl font-black text-siamPurple">NT$ 0</span>
                    </div>
                    <button onclick="checkoutOrder()" class="w-full mt-2 bg-siamPurple text-white font-bold py-3 rounded-xl text-sm tracking-widest">
                        送出訂單
                    </button>
                </div>
            </div>
        </div>
    </main>

            { category: '甜點與飲料', name: '清香舒芙茶', price: 100, spicy: 0, adjustable: false, img: 'img77.jpg' },
            { category: '甜點與飲料', name: '穀香蕎麥茶', price: 100, spicy: 0, adjustable: false, img: 'img78.jpg' },

            // 來點蔬食
            { category: '來點蔬食', name: '(素)蛋素青木瓜涼拌', price: 260, spicy: 0, adjustable: false, img: 'img79.jpg' },
            { category: '來點蔬食', name: '(素)蛋素什錦炒飯', price: 280, spicy: 0, adjustable: false, img: 'img80.jpg' },
            { category: '來點蔬食', name: '(素)蛋素炒河粉', price: 260, spicy: 0, adjustable: false, img: 'img81.jpg' },
            { category: '來點蔬食', name: '(素)清炒空心菜', price: 220, spicy: 0, adjustable: false, img: 'img82.jpg' },
            { category: '來點蔬食', name: '(素)清炒什錦蔬菜', price: 220, spicy: 0, adjustable: false, img: 'img83.jpg' },
            { category: '來點蔬食', name: '(素)清炒高麗菜', price: 220, spicy: 0, adjustable: false, img: 'img84.jpg' },
            { category: '來點蔬食', name: '(素)鮮菇玉米湯', price: 320, spicy: 0, adjustable: false, img: 'img85.jpg' },
            { category: '來點蔬食', name: '(素)香茅椰肉野菇湯', price: 300, spicy: 0, adjustable: false, img: 'img86.jpg' }
        ];

        let orderSession = { store: '', date: '', period: '', name: '', phone: '' };
        let cart = [];
        let currentCategory = '饗泰多TOP10';

        function selectStore(storeName) {
            orderSession.store = storeName;
            updateStepper(2, '50%');
            document.getElementById('panel-1').classList.add('hidden');
            document.getElementById('panel-2').classList.remove('hidden');
        }

        function selectPeriod(periodName) {
            orderSession.period = periodName;
            ['lunch', 'tea', 'dinner'].forEach(id => document.getElementById(`btn-period-${id}`).className = 'p-3 border border-gray-200 rounded-xl text-sm font-medium hover:bg-gray-50');
            const activeId = periodName === '午餐' ? 'lunch' : periodName === '下午茶' ? 'tea' : 'dinner';
            document.getElementById(`btn-period-${activeId}`).className = 'p-3 border border-siamPurple bg-siamPurple text-white rounded-xl text-sm font-medium';
        }

        function submitStep2() {
            const dateValue = document.getElementById('input-date').value;
            if (!dateValue || !orderSession.period) { alert('請填妥用餐日期與餐期！'); return; }
            orderSession.date = dateValue;
            updateStepper(3, '100%');
            document.getElementById('panel-2').classList.add('hidden');
            document.getElementById('panel-3').classList.remove('hidden');
        }

        function submitStep3() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            if (!name || !/^09\d{8}$/.test(phone)) { alert('請正確填寫聯絡姓名與台灣手機號碼！'); return; }
            orderSession.name = name; orderSession.phone = phone;

            document.getElementById('wizard-container').classList.add('hidden');
            document.getElementById('stepper-region').classList.add('hidden');
            
            document.getElementById('header-status').classList.remove('hidden');
            document.getElementById('selected-store-tag').innerText = orderSession.store;
            document.getElementById('selected-time-tag').innerText = `${orderSession.date} (${orderSession.period}) ｜ ${orderSession.name} 貴賓`;

            renderCategoryBar();
            renderDishes();
            const menuContainer = document.getElementById('menu-container');
            menuContainer.classList.remove('hidden');
            setTimeout(() => menuContainer.classList.remove('opacity-0'), 50);
        }

        function goBack(targetStep) {
            if (targetStep === 1) {
                updateStepper(1, '0%');
                document.getElementById('panel-2').classList.add('hidden');
                document.getElementById('panel-1').classList.remove('hidden');
            } else {
                updateStepper(2, '50%');
                document.getElementById('panel-3').classList.add('hidden');
                document.getElementById('panel-2').classList.remove('hidden');
            }
        }

        function updateStepper(activeStep, progressWidth) {
            document.getElementById('step-progress-line').style.width = progressWidth;
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`circle-${i}`).className = i <= activeStep ? "w-8 h-8 rounded-full bg-siamPurple text-white flex items-center justify-center font-bold text-sm" : "w-8 h-8 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center font-bold text-sm";
                document.getElementById(`text-${i}`).className = i <= activeStep ? "text-xs font-bold text-siamPurple mt-2" : "text-xs font-medium text-gray-400 mt-2";
            }
        }

        function renderCategoryBar() {
            const categories = [...new Set(dishData.map(d => d.category))];
            const bar = document.getElementById('category-bar');
            bar.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.className = cat === currentCategory 
                    ? "px-5 py-1.5 rounded-full text-xs font-semibold bg-siamPurple text-white shadow-sm flex-shrink-0 transition" 
                    : "px-5 py-1.5 rounded-full text-xs font-medium bg-white text-gray-600 hover:bg-gray-100 flex-shrink-0 transition";
                btn.onclick = () => { currentCategory = cat; renderCategoryBar(); renderDishes(); };
                bar.appendChild(btn);
            });
        }

        function renderDishes() {
            const grid = document.getElementById('dishes-grid');
            grid.innerHTML = '';
            const filtered = dishData.filter(d => d.category === currentCategory);

            filtered.forEach(dish => {
                let chiliHtml = '';
                if (dish.spicy > 0) {
                    for(let i=0; i<dish.spicy; i++) {
                        chiliHtml += `<i class="fa-solid fa-chili-pepper text-red-500 text-xs mr-0.5"></i>`;
                    }
                }

                let adjustBadge = '';
                if (!dish.adjustable) {
                    adjustBadge = `<span class="text-[10px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded font-normal">辣度固定</span>`;
                } else if (dish.spicy > 0 && dish.adjustable) {
                    adjustBadge = `<span class="text-[10px] bg-red-50 text-red-600 px-1.5 py-0.5 rounded font-normal">可調辣</span>`;
                }

                const subDescHtml = dish.subdesc ? `<p class="text-[11px] text-gray-400 mt-0.5 font-light">${dish.subdesc}</p>` : '';

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between group hover:shadow-md transition duration-300";
                card.innerHTML = `
                    <div>
                        <div class="relative overflow-hidden aspect-[4/3] bg-gray-100">
                            <img src="${dish.img}" alt="${dish.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=600&q=80'">
                        </div>
                        <div class="p-4">
                            <div class="flex items-start justify-between space-x-1 mb-1">
                                <h3 class="text-sm font-bold text-gray-900 leading-tight">${dish.name}</h3>
                                ${adjustBadge}
                            </div>
                            ${subDescHtml}
                            <div class="flex items-center h-4 mt-1">
                                ${chiliHtml ? chiliHtml : '<span class="text-xs text-gray-400 font-light">不辣</span>'}
                            </div>
                        </div>
                    </div>
                    <div class="p-4 pt-0 flex items-center justify-between">
                        <span class="text-base font-black text-siamPurple"><span class="text-xs font-medium mr-0.5">NT$</span>${dish.price ? dish.price : '組合價'}</span>
                        <button onclick="addToCart('${dish.name}', ${dish.price ? dish.price : 0})" class="bg-siamPurple hover:bg-siamPurple/90 text-white text-xs px-3 py-1.5 rounded-xl font-medium shadow-sm transition">
                            <i class="fa-solid fa-plus mr-0.5"></i>加入
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(name, price) {
            if(price === 0) { alert('此為套餐明細，請直接點選上方大組合包品項加入！'); return; }
            const existing = cart.find(i => i.name === name);
            if (existing) { existing.quantity += 1; } else { cart.push({ name, price, quantity: 1 }); }
            updateCartUI();
        }

        function updateQuantity(name, amt) {
            const item = cart.find(i => i.name === name);
            if (item) {
                item.quantity += amt;
                if (item.quantity <= 0) cart = cart.filter(i => i.name !== name);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.appendChild(emptyState);
                document.getElementById('cart-count').innerText = '0 項商品';
                document.getElementById('subtotal').innerText = 'NT$ 0';
                document.getElementById('service-charge').innerText = 'NT$ 0';
                document.getElementById('total-amount').innerText = 'NT$ 0';
                return;
            }

            let subtotal = 0, totalQty = 0;
            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                totalQty += item.quantity;
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between border-b border-gray-50 pb-2';
                row.innerHTML = `
                    <div class="flex-1 pr-2">
                        <h4 class="text-xs font-bold text-gray-800">${item.name}</h4>
                        <span class="text-xs text-siamPurple font-medium">NT$ ${item.price}</span>
                    </div>
                    <div class="flex items-center space-x-2 bg-gray-50 rounded-lg p-1 border border-gray-100">
                        <button onclick="updateQuantity('${item.name}', -1)" class="w-5 h-5 rounded bg-white text-xs text-gray-500 shadow-sm"><i class="fa-solid fa-minus"></i></button>
                        <span class="text-xs font-bold text-gray-800 w-4 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity('${item.name}', 1)" class="w-5 h-5 rounded bg-white text-xs text-gray-500 shadow-sm"><i class="fa-solid fa-plus"></i></button>
                    </div>`;
                container.appendChild(row);
            });

            const svc = Math.round(subtotal * 0.1);
            document.getElementById('cart-count').innerText = `${totalQty} 項商品`;
            document.getElementById('subtotal').innerText = `NT$ ${subtotal.toLocaleString()}`;
            document.getElementById('service-charge').innerText = `NT$ ${svc.toLocaleString()}`;
            document.getElementById('total-amount').innerText = `NT$ ${(subtotal + svc).toLocaleString()}`;
        }

        function checkoutOrder() {
            if (cart.length === 0) { alert('購物車內無任何商品喔！'); return; }
            alert(`【訂單成功提交】\n顧客：${orderSession.name} 貴賓 (${orderSession.phone})\n分店：${orderSession.store}\n金額總計：${document.getElementById('total-amount').innerText}`);
        }
    </script>
</body>
</html>
