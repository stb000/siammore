<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siam More 風格極簡點餐系統</title>
    <!-- 引入 Tailwind CSS 進行快速、簡約的樣式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // 參考饗泰多風格的品牌色調
                        siamPurple: '#4A2A74', // 品牌主色：洗鍊的深紫
                        siamGold: '#C9A054',   // 點綴色：質感的暖金
                        siamBg: '#F9F8F6'      // 背景色：簡約的米白
                    }
                }
            }
        }
    </script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-siamBg text-gray-800 min-h-screen flex flex-col">

    <!-- 頂部導覽列 Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-2xl font-bold tracking-wider text-siamPurple flex items-center">
                    <i class="fa-solid fa-utensils mr-2 text-siamGold"></i>SIAM MORE
                </span>
                <span class="text-xs bg-siamPurple text-white px-2 py-0.5 rounded font-light tracking-widest">點餐系統</span>
            </div>
            <div class="text-sm text-gray-500 font-medium">桌號：A06</div>
        </div>
    </header>

    <!-- 主要內容區塊 -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        
        <!-- 左側：菜單分類與商品列表 (佔據主要寬度) -->
        <div class="flex-1 flex flex-col">
            
            <!-- 分類橫條 (Sticky 釘在頂部) -->
            <div class="sticky top-16 bg-siamBg py-2 z-30 overflow-x-auto no-scrollbar flex space-x-2 border-b border-gray-200/60 mb-6">
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-siamPurple text-white shadow-sm transition">熱門推薦</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-100 transition">經典肉類</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-100 transition">鮮腴海鮮</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-100 transition">泰風蔬食</button>
                <button class="px-5 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-100 transition">泰風飲品</button>
            </div>

            <!-- 商品 Grid 列表 -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                
                <!-- 商品卡片 1 -->
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between group hover:shadow-md transition duration-300">
                    <div>
                        <div class="relative overflow-hidden aspect-[4/3] bg-gray-100">
                            <!-- 預留圖片位置，使用 Unsplash 質感美食照示意 -->
                            <img src="https://images.unsplash.com/photo-1559314809-0d155014e29e?auto=format&fit=crop&w=600&q=80" alt="冠軍月亮蝦餅" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                            <span class="absolute top-3 left-3 bg-red-500 text-white text-xs px-2 py-1 rounded-md font-medium">Top 1</span>
                        </div>
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-gray-900 mb-1">冠軍月亮蝦餅</h3>
                            <p class="text-gray-400 text-xs line-clamp-2 font-light">全台最厚 2 公分！內餡滿滿現打草蝦仁，每一口都酥脆彈牙。</p>
                        </div>
                    </div>
                    <div class="p-4 pt-0 flex items-center justify-between">
                        <span class="text-xl font-bold text-siamPurple"><span class="text-sm font-medium mr-0.5">NT$</span>420</span>
                        <button onclick="addToCart('冠軍月亮蝦餅', 420)" class="bg-siamPurple hover:bg-siamPurple/90 text-white text-sm px-4 py-2 rounded-xl font-medium shadow-sm transition flex items-center space-x-1">
                            <i class="fa-solid fa-plus text-xs"></i>
                            <span>加入購物車</span>
                        </button>
                    </div>
                </div>

                <!-- 商品卡片 2 -->
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between group hover:shadow-md transition duration-300">
                    <div>
                        <div class="relative overflow-hidden aspect-[4/3] bg-gray-100">
                            <img src="https://images.unsplash.com/photo-1565557623262-b51c2513a641?auto=format&fit=crop&w=600&q=80" alt="黃金咖哩雞" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-gray-900 mb-1">黃金咖哩雞</h3>
                            <p class="text-gray-400 text-xs line-clamp-2 font-light">精心熬煮泰式黃咖哩，搭配鮮嫩去骨雞腿肉與綿密馬鈴薯。</p>
                        </div>
                    </div>
                    <div class="p-4 pt-0 flex items-center justify-between">
                        <span class="text-xl font-bold text-siamPurple"><span class="text-sm font-medium mr-0.5">NT$</span>380</span>
                        <button onclick="addToCart('黃金咖哩雞', 380)" class="bg-siamPurple hover:bg-siamPurple/90 text-white text-sm px-4 py-2 rounded-xl font-medium shadow-sm transition flex items-center space-x-1">
                            <i class="fa-solid fa-plus text-xs"></i>
                            <span>加入購物車</span>
                        </button>
                    </div>
                </div>

                <!-- 商品卡片 3 -->
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between group hover:shadow-md transition duration-300">
                    <div>
                        <div class="relative overflow-hidden aspect-[4/3] bg-gray-100">
                            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=600&q=80" alt="蝦醬空心菜" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-gray-900 mb-1">蝦醬空心菜</h3>
                            <p class="text-gray-400 text-xs line-clamp-2 font-light">大火爆炒鮮脆空心菜，融入濃厚手工提煉蝦醬，鑊氣十足。</p>
                        </div>
                    </div>
                    <div class="p-4 pt-0 flex items-center justify-between">
                        <span class="text-xl font-bold text-siamPurple"><span class="text-sm font-medium mr-0.5">NT$</span>220</span>
                        <button onclick="addToCart('蝦醬空心菜', 220)" class="bg-siamPurple hover:bg-siamPurple/90 text-white text-sm px-4 py-2 rounded-xl font-medium shadow-sm transition flex items-center space-x-1">
                            <i class="fa-solid fa-plus text-xs"></i>
                            <span>加入購物車</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- 右側：固定式購物車 Sidepanel (桌機固定，手機寬度自適應) -->
        <div class="w-full lg:w-96 bg-white rounded-2xl border border-gray-200/80 p-5 shadow-sm sticky top-28 self-start flex flex-col max-h-[calc(100vh-8rem)]">
            <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
                <h2 class="text-lg font-bold text-gray-900 flex items-center">
                    <i class="fa-solid fa-shopping-bag mr-2 text-siamGold"></i>明細隨時看
                </h2>
                <span id="cart-count" class="bg-siamBg text-siamPurple text-xs px-2 py-1 rounded-full font-bold">0 項商品</span>
            </div>

            <!-- 購物車品項滾動區 -->
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 no-scrollbar min-h-[150px] max-h-[300px] pr-1">
                <!-- 空購物車狀態 -->
                <div id="empty-state" class="text-center py-8 text-gray-400 flex flex-col items-center justify-center space-y-2">
                    <i class="fa-solid fa-receipt text-3xl text-gray-200"></i>
                    <p class="text-sm font-light">尚未選擇任何美味菜色</p>
                </div>
            </div>

            <!-- 計價與結帳區 -->
            <div class="border-t border-gray-100 pt-4 mt-4 space-y-3">
                <div class="flex justify-between text-sm text-gray-500">
                    <span>小計 Subtotal</span>
                    <span id="subtotal">NT$ 0</span>
                </div>
                <div class="flex justify-between text-sm text-gray-500">
                    <span>服務費 Service Charge (10%)</span>
                    <span id="service-charge">NT$ 0</span>
                </div>
                <div class="flex justify-between items-center pt-2 border-t border-dashed border-gray-200">
                    <span class="font-bold text-gray-900">總計 Total</span>
                    <span id="total-amount" class="text-2xl font-black text-siamPurple">NT$ 0</span>
                </div>
                <button class="w-full mt-2 bg-siamPurple hover:bg-siamPurple/90 text-white font-bold py-3.5 rounded-xl transition duration-150 shadow-md shadow-siamPurple/10 tracking-widest text-sm">
                    送出訂單
                </button>
            </div>
        </div>

    </main>

    <!-- 簡易購物車 Logic 控制指令碼 -->
    <script>
        let cart = [];

        function addToCart(name, price) {
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            updateCartUI();
        }

        function updateQuantity(name, amount) {
            const item = cart.find(item => item.name === name);
            if (item) {
                item.quantity += amount;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.name !== name);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const emptyState = document.getElementById('empty-state');
            const cartCount = document.getElementById('cart-count');
            const subtotalEl = document.getElementById('subtotal');
            const serviceChargeEl = document.getElementById('service-charge');
            const totalAmountEl = document.getElementById('total-amount');

            // 清空容器，保留空狀態元素
            cartItemsContainer.innerHTML = '';

            if (cart.length === 0) {
                cartItemsContainer.appendChild(emptyState);
                cartCount.innerText = '0 項商品';
                subtotalEl.innerText = 'NT$ 0';
                serviceChargeEl.innerText = 'NT$ 0';
                totalAmountEl.innerText = 'NT$ 0';
                return;
            }

            let subtotal = 0;
            let totalItems = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                totalItems += item.quantity;

                const itemRow = document.createElement('div');
                itemRow.className = 'flex items-center justify-between border-b border-gray-50/60 pb-3';
                itemRow.innerHTML = `
                    <div class="flex-1 pr-2">
                        <h4 class="text-sm font-bold text-gray-800">${item.name}</h4>
                        <span class="text-xs text-siamPurple font-medium">NT$ ${item.price}</span>
                    </div>
                    <div class="flex items-center space-x-2.5 bg-gray-50 rounded-lg p-1 border border-gray-100">
                        <button onclick="updateQuantity('${item.name}', -1)" class="w-6 h-6 rounded bg-white hover:bg-gray-100 flex items-center justify-center text-xs text-gray-500 shadow-sm transition">
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <span class="text-sm font-bold text-gray-800 w-4 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity('${item.name}', 1)" class="w-6 h-6 rounded bg-white hover:bg-gray-100 flex items-center justify-center text-xs text-gray-500 shadow-sm transition">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                `;
                cartItemsContainer.appendChild(itemRow);
            });

            const serviceCharge = Math.round(subtotal * 0.1);
            const total = subtotal + serviceCharge;

            cartCount.innerText = `${totalItems} 項商品`;
            subtotalEl.innerText = `NT$ ${subtotal.toLocaleString()}`;
            serviceChargeEl.innerText = `NT$ ${serviceCharge.toLocaleString()}`;
            totalAmountEl.innerText = `NT$ ${total.toLocaleString()}`;
        }
    </script>
</body>
</html>
