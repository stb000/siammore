<!DOCTYPE html>
<html lang="zh-TW" class="bg-[#0b0b0c] text-[#e2e8f0] antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiamMore | Digital Garden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body 
    class="max-w-2xl mx-auto px-6 py-16 md:py-24 tracking-tight"
    x-data="{ 
        lang: 'zh', 
        currentTab: 'all',
        // 這裡放你所有的專案/文章數據（底層資料庫邏輯）
        items: [
            { id: 1, type: 'work', year: '2026', zh: { title: '饗泰多營運優化', desc: '針對連鎖餐飲進行數位轉型與流程重塑。' }, en: { title: 'SiamMore Operation', desc: 'Digital transformation and workflow restructuring.' } },
            { id: 2, type: 'oss', year: '★ 1.2k', zh: { title: '極簡 UI 框架', desc: '基於 Tailwind 的輕量級開源組件庫。' }, en: { title: 'Minimal UI Kit', desc: 'Lightweight open-source components based on Tailwind.' } },
            { id: 3, type: 'posts', year: 'May 12', zh: { title: '淺談極簡網頁設計', desc: '為什麼克制的設計反而能留住使用者的目光？' }, en: { title: 'On Minimalism Design', desc: 'Why restrained design captures more user attention.' } },
            { id: 4, type: 'oss', year: '★ 420', zh: { title: '自動化部署腳本', desc: '一鍵將本地專案打包並推送到 Vercel 雲端。' }, en: { title: 'Auto Deploy Script', desc: 'One-click packaging and deployment to Vercel.' } }
        ]
    }"
>

    <nav class="flex justify-between items-center mb-16">
        <div class="text-sm font-mono text-zinc-500 hover:text-zinc-300 cursor-pointer">siammore.dev</div>
        <button 
            @click="lang = (lang === 'zh' ? 'en' : 'zh')" 
            class="text-xs font-mono bg-zinc-900 border border-zinc-800 hover:border-zinc-600 px-3 py-1.5 rounded-md text-zinc-400 hover:text-white transition-all"
            x-text="lang === 'zh' ? 'EN' : '中'"
        >
        </button>
    </nav>

    <header class="mb-14">
        <h1 class="text-2xl font-bold text-white mb-2" x-text="lang === 'zh' ? '您的名字' : 'Your Name'"></h1>
        <p class="text-zinc-400 text-sm mb-4" x-text="lang === 'zh' ? '網頁設計師 / 數位創作者' : 'Web Designer / Digital Creator'"></p>
        <p class="text-zinc-500 leading-relaxed text-sm max-w-lg" x-text="lang === 'zh' ? '「Life is Art」— 專注於品牌管理與極簡美學。用克制的設計與代碼，打造極致流暢的網頁體驗。' : '“Life is Art” — Focusing on brand management and minimalist aesthetics. Crafting seamless web experiences with restrained design.'">
        </p>
    </header>

    <section class="mb-8">
        <div class="flex space-x-2 border-b border-zinc-900 pb-3 text-xs font-mono">
            <button @click="currentTab = 'all'" :class="currentTab === 'all' ? 'text-white font-bold' : 'text-zinc-500 hover:text-zinc-300'" class="transition-colors">All</button>
            <span class="text-zinc-800">/</span>
            <button @click="currentTab = 'work'" :class="currentTab === 'work' ? 'text-white font-bold' : 'text-zinc-500 hover:text-zinc-300'" class="transition-colors">Work</button>
            <span class="text-zinc-800">/</span>
            <button @click="currentTab = 'oss'" :class="currentTab === 'oss' ? 'text-white font-bold' : 'text-zinc-500 hover:text-zinc-300'" class="transition-colors">OSS</button>
            <span class="text-zinc-800">/</span>
            <button @click="currentTab = 'posts'" :class="currentTab === 'posts' ? 'text-white font-bold' : 'text-zinc-500 hover:text-zinc-300'" class="transition-colors">Posts</button>
        </div>
    </section>

    <main class="mb-20 min-height-[300px]">
        <div class="space-y-2">
            <template x-for="item in items" :key="item.id">
                <div 
                    x-show="currentTab === 'all' || currentTab === item.type"
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 transform translate-y-1"
                    x-transition:enter-end="opacity-100 transform translate-y-0"
                    class="p-4 rounded-lg border border-zinc-900 bg-zinc-900/10 hover:bg-zinc-900/40 hover:border-zinc-800 transition-all duration-200"
                >
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-zinc-200 font-medium text-sm" x-text="lang === 'zh' ? item.zh.title : item.en.title"></h3>
                            <p class="text-zinc-500 text-xs mt-1" x-text="lang === 'zh' ? item.zh.desc : item.en.desc"></p>
                        </div>
                        <span class="text-[10px] font-mono text-zinc-600 bg-zinc-900 px-2 py-0.5 rounded border border-zinc-800" x-text="item.year"></span>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <footer class="border-t border-zinc-900 pt-6 flex justify-between items-center text-[11px] text-zinc-600 font-mono">
        <div class="flex space-x-4">
            <a href="#" class="hover:text-zinc-400 transition-colors">GitHub</a>
            <a href="#" class="hover:text-zinc-400 transition-colors">Twitter</a>
        </div>
        <div>© 2026 SiamMore.</div>
    </footer>

</body>
</html>
